<!DOCTYPE html>
<html>
<head>
    <title>Ajeiay</title>

    <style>
        body{
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .menu{
            display: flex;
            justify-content: center;
            gap: 40px;
            background-color: #333;
            padding: 15px;
        }

        .menu h2{
            color: white;
            margin: 0;
            cursor: pointer;
        }

        .menu h2:hover{
            color: yellow;
        }

        .newstyle{
            color: darkblue;
            font-size: 22px;
            font-weight: bold;
        }

        a{
            color: green;
            text-decoration: none;
            font-size: 18px;
        }

        a:hover{
            color: red;
        }

        button{
            background-color: orange;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: red;
        }

        img{
            margin-top: 20px;
            border: 4px solid blue;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <div class="menu">
        <h2>HOME</h2>
        <h2>BOOKS</h2>
        <h2>STUDENTS</h2>
    </div>

    <br>

    <p class="newstyle">Kongu Engineering College</p>

    <a target="_blank" href="http://kongu.ac.in/">
        Show My College Website
    </a>

    <br><br>

    <button>Click Me</button>

    <br><br>

    <img src="https://kongusem.github.io/semester-resuts/kongu.jpg"
         width="250"
         height="250"
         alt="Kongu Engineering College">

</body>
</html>
